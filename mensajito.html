<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensajitos para Matías</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ffd6ec,#dff6ff,#fff5d7);
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{
color:#ff4fa3;
margin-top:25px;
text-align:center;
font-size:28px;
}

p{
text-align:center;
color:#555;
margin-bottom:10px;
}

/* contenedor del formulario */
.form-box{
width:92%;
max-width:420px;
background:white;
border-radius:25px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
margin-top:15px;
overflow:hidden;
}

/* iframe Tally */
iframe{
width:100%;
height:520px;
border:none;
border-radius:15px;
}

/* botón home */
.home{
margin-top:20px;
text-decoration:none;
color:#444;
font-size:14px;
}

/* botón discreto padres */
.admin{
position:fixed;
bottom:15px;
right:15px;
font-size:12px;
opacity:0.4;
background:white;
padding:6px 10px;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<h1>💌 Mensajitos para Matías</h1>
<p>✨ Escribí tu deseo, recuerdo o saludo</p>

<div class="form-box">
  <iframe src="https://tally.so/r/81Wadx" allow="fullscreen"></iframe>
</div>

<a class="home" href="index.html">🏠 Volver al inicio</a>

<div class="admin" onclick="window.location.href='mensajes.html'">
mensajes
</div>

</body>
</html>
