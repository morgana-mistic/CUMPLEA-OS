<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dale play a mi fiesta</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --pink1:#ffd2ea;
      --pink2:#ff9fd0;
      --pink3:#f45bb0;

      --blue1:#d9f5ff;
      --blue2:#9fe7ff;
      --blue3:#4dcdf8;

      --violet1:#eadcff;
      --violet2:#d0b1ff;
      --violet3:#a873ff;

      --mint1:#dffdf0;
      --mint2:#a7f5d0;
      --mint3:#43d6a2;

      --yellow1:#fff7c8;
      --yellow2:#ffe27a;
      --yellow3:#ffcb4d;

      --peach1:#ffe8cf;
      --peach2:#ffd29b;
      --peach3:#ffad55;

      --text:#6f4a76;
      --muted:#8e7492;
      --white-card:rgba(255,255,255,.92);
      --shadow-main:0 18px 38px rgba(140,170,210,.18);
      --shadow-soft:0 12px 24px rgba(130,150,190,.14);
    }

    body{
      font-family:Arial,sans-serif;
      min-height:100vh;
      padding:18px 14px 24px;
      overflow-x:hidden;
      color:var(--text);
      position:relative;
      background:
        radial-gradient(circle at 18% 10%, #ffe0f0 0%, transparent 34%),
        radial-gradient(circle at 84% 16%, #d6f5ff 0%, transparent 36%),
        radial-gradient(circle at 18% 86%, #fff1c8 0%, transparent 30%),
        radial-gradient(circle at 86% 78%, #e8ddff 0%, transparent 32%),
        linear-gradient(180deg,#fff8fc 0%, #f4fbff 54%, #fffaf4 100%);
    }

    /* capa de confeti suave */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:.95;
      background:
        radial-gradient(circle at 10% 18%, rgba(255,105,180,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 28% 68%, rgba(77,205,248,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 72% 26%, rgba(255,162,70,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 90% 60%, rgba(163,120,255,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 52% 46%, rgba(83,216,168,.22) 0 2px, transparent 3px),
        radial-gradient(circle at 22% 42%, rgba(255,210,90,.20) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 78%, rgba(244,91,176,.20) 0 2px, transparent 3px);
    }

    /* serpentinas / caramelitos suaves */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:.42;
      background:
        radial-gradient(18px 10px at 14% 24%, rgba(255,255,255,.75) 0 55%, transparent 56%),
        radial-gradient(18px 10px at 84% 30%, rgba(255,255,255,.75) 0 55%, transparent 56%),
        radial-gradient(18px 10px at 22% 76%, rgba(255,255,255,.75) 0 55%, transparent 56%),
        radial-gradient(18px 10px at 72% 82%, rgba(255,255,255,.75) 0 55%, transparent 56%),
        repeating-linear-gradient(
          45deg,
          rgba(255,182,193,.09) 0 8px,
          transparent 8px 26px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(173,216,230,.08) 0 8px,
          transparent 8px 26px
        );
    }

    .page{
      max-width:580px;
      margin:0 auto;
      position:relative;
      z-index:1;
    }

    .card{
      position:relative;
      background:linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,255,255,.90));
      border-radius:34px;
      padding:14px;
      box-shadow:var(--shadow-main);
      overflow:hidden;
      backdrop-filter:blur(4px);
    }

    .card::before,
    .card::after{
      content:"";
      position:absolute;
      border-radius:999px;
      pointer-events:none;
      z-index:0;
    }

    .card::before{
      width:160px;
      height:160px;
      top:-46px;
      right:-36px;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.96), rgba(207,241,255,.96) 55%, rgba(160,220,255,.88) 100%);
      opacity:.88;
    }

    .card::after{
      width:120px;
      height:120px;
      bottom:-24px;
      left:-16px;
      background:radial-gradient(circle at 30% 30%, rgba(255,255,255,.96), rgba(255,228,242,.95) 55%, rgba(255,184,221,.88) 100%);
      opacity:.88;
    }

    .card-inner{
      position:relative;
      z-index:1;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }

    .back-btn{
      text-decoration:none;
      background:linear-gradient(180deg,#ffd8ec,#ffb8db);
      color:#7d4d84;
      font-weight:900;
      padding:12px 16px;
      border-radius:18px;
      box-shadow:0 10px 18px rgba(0,0,0,.10);
      transition:transform .18s ease, box-shadow .18s ease;
      white-space:nowrap;
      font-size:.92rem;
    }

    .back-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 22px rgba(0,0,0,.12);
    }

    .title-pill{
      flex:1;
      text-align:center;
      background:linear-gradient(180deg,#ffffff,#fff8fc);
      color:#8a5b92;
      font-weight:900;
      padding:12px 16px;
      border-radius:999px;
      box-shadow:0 8px 18px rgba(0,0,0,.08);
      font-size:1rem;
    }

    .hero{
      text-align:center;
      padding:8px 10px 0;
      margin-bottom:16px;
    }

    .hero h1{
      font-size:1.7rem;
      color:#7b4a84;
      margin-bottom:8px;
    }

    .hero p{
      max-width:430px;
      margin:0 auto;
      font-size:1rem;
      line-height:1.5;
      color:var(--muted);
    }

    /* Marco candy del reproductor */
    .music-shell{
      position:relative;
      margin-top:16px;
      padding:14px;
      border-radius:30px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.95), rgba(255,255,255,.85)),
        linear-gradient(135deg, #ffe0f0, #dff6ff);
      box-shadow:var(--shadow-soft);
      overflow:hidden;
    }

    .music-shell::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:24px;
      background:
        radial-gradient(circle at 14% 20%, rgba(255,170,210,.22) 0 12%, transparent 13%),
        radial-gradient(circle at 86% 18%, rgba(159,231,255,.24) 0 12%, transparent 13%),
        radial-gradient(circle at 18% 84%, rgba(255,210,120,.22) 0 11%, transparent 12%),
        radial-gradient(circle at 82% 82%, rgba(208,177,255,.22) 0 11%, transparent 12%),
        linear-gradient(180deg, rgba(255,255,255,.55), rgba(255,255,255,.18));
      pointer-events:none;
    }

    .music-shell::after{
      content:"";
      position:absolute;
      top:16px;
      left:18px;
      width:84px;
      height:26px;
      border-radius:999px;
      background:rgba(255,255,255,.34);
      filter:blur(1px);
      transform:rotate(-8deg);
      pointer-events:none;
    }

    .music-frame-wrap{
      position:relative;
      z-index:1;
      background:linear-gradient(180deg,#ffffff,#fbfdff);
      border-radius:24px;
      padding:12px;
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.72), 0 10px 24px rgba(120,170,220,.12);
    }

    .spotify-frame{
      width:100%;
      min-height:352px;
      border:none;
      border-radius:18px;
      display:block;
      background:#fff;
    }

    .bottom-note{
      margin-top:16px;
      text-align:center;
      color:#8a6d8e;
      font-size:.96rem;
      line-height:1.45;
      padding:0 10px;
    }

    .footer{
      margin-top:16px;
      text-align:center;
      font-size:.78rem;
      color:#9aa6b7;
      line-height:1.35;
    }

    @media (max-width: 560px){
      body{
        padding:14px 10px 20px;
      }

      .card{
        border-radius:26px;
        padding:10px;
      }

      .topbar{
        flex-direction:column;
        align-items:stretch;
      }

      .title-pill{
        font-size:.95rem;
      }

      .hero h1{
        font-size:1.42rem;
      }

      .hero p{
        font-size:.95rem;
      }

      .music-shell{
        border-radius:24px;
        padding:10px;
      }

      .music-frame-wrap{
        border-radius:20px;
        padding:10px;
      }

      .spotify-frame{
        min-height:352px;
      }
    }
  </style>
</head>
<body>

  <main class="page">
    <section class="card">
      <div class="card-inner">

        <div class="topbar">
          <a href="index.html" class="back-btn">← Volver al cumple</a>
          <div class="title-pill">🎵 Dale play a mi fiesta 🎵</div>
        </div>

        <div class="hero">
          <h1>La música de mi cumple</h1>
          <p>
            Una playlist para seguir festejando conmigo, cantar, bailar y guardar un pedacito de este día 💖🎉
          </p>
        </div>

        <div class="music-shell">
          <div class="music-frame-wrap">
            <iframe
              class="spotify-frame"
              src="https://open.spotify.com/embed/playlist/3pZjoQ5djaJCTi1eWR24Pa?utm_source=generator&theme=0"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy">
            </iframe>
          </div>
        </div>

        <p class="bottom-note">
          Dale play y reviví la fiesta cuando quieras ✨
        </p>

        <div class="footer">
          Un recuerdo dulce de mi cumpleaños para vos 💕
        </div>

      </div>
    </section>
  </main>

</body>
</html>
