<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Música del cumple de Matías</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;}

    :root{
      --pink:#ff8fcb;
      --pink-strong:#f25aae;
      --blue:#8ee7ff;
      --blue-strong:#43c9f3;
      --violet:#d7bbff;
      --violet-strong:#a772ff;
      --mint:#a9f5d8;
      --mint-strong:#48d5a5;
      --yellow:#ffe69a;
      --yellow-strong:#ffc94d;
      --peach:#ffd2b0;
      --peach-strong:#ff9d63;

      --text:#6b4d73;
      --muted:#8b7191;
      --white:#ffffff;
    }

    body{
      font-family:Arial,sans-serif;
      min-height:100vh;
      padding:18px 14px 26px;
      color:var(--text);
      overflow-x:hidden;
      background:
        radial-gradient(circle at 14% 12%, rgba(255,192,223,.95) 0 12%, transparent 13%),
        radial-gradient(circle at 84% 16%, rgba(186,239,255,.95) 0 10%, transparent 11%),
        radial-gradient(circle at 18% 84%, rgba(255,228,164,.85) 0 11%, transparent 12%),
        radial-gradient(circle at 82% 78%, rgba(205,186,255,.9) 0 11%, transparent 12%),
        linear-gradient(180deg,#ffeef7 0%, #eefbff 48%, #fff7ef 100%);
      position:relative;
    }

    /* CONFETI DE FONDO GENERAL */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      background:
        radial-gradient(circle at 8% 18%, rgba(255,105,180,.30) 0 3px, transparent 4px),
        radial-gradient(circle at 28% 72%, rgba(77,205,248,.28) 0 3px, transparent 4px),
        radial-gradient(circle at 74% 24%, rgba(255,162,70,.26) 0 3px, transparent 4px),
        radial-gradient(circle at 90% 60%, rgba(163,120,255,.28) 0 3px, transparent 4px),
        radial-gradient(circle at 52% 44%, rgba(83,216,168,.26) 0 3px, transparent 4px),
        radial-gradient(circle at 62% 84%, rgba(255,205,80,.28) 0 3px, transparent 4px);
      opacity:.9;
      animation:confettiFloat 12s linear infinite alternate;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:0;
      background:
        repeating-linear-gradient(35deg,
          rgba(255,182,193,.10) 0px,
          rgba(255,182,193,.10) 6px,
          transparent 6px,
          transparent 20px),
        repeating-linear-gradient(-35deg,
          rgba(173,216,230,.10) 0px,
          rgba(173,216,230,.10) 6px,
          transparent 6px,
          transparent 22px);
      opacity:.45;
    }

    @keyframes confettiFloat{
      0%{transform:translateY(0);}
      100%{transform:translateY(-20px);}
    }

    .page{
      position:relative;
      z-index:1;
      width:min(100%, 560px);
      margin:0 auto;
    }

    /* BOTON VOLVER */
    .topbar{
      display:flex;
      justify-content:flex-start;
      margin-bottom:14px;
    }

    .back-btn{
      display:inline-flex;
      align-items:center;
      gap:8px;
      text-decoration:none;
      color:#fff;
      font-weight:800;
      font-size:.95rem;
      padding:12px 16px;
      border-radius:18px;
      background:linear-gradient(180deg,var(--pink),var(--pink-strong));
      box-shadow:0 10px 20px rgba(242,90,174,.25);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .back-btn:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 24px rgba(242,90,174,.30);
    }

    /* TARJETA PRINCIPAL */
    .music-card{
      position:relative;
      overflow:hidden;
      border-radius:34px;
      padding:22px 18px 24px;
      box-shadow:0 18px 42px rgba(150,140,200,.18);
      border:2px solid rgba(255,255,255,.65);

      /* AQUI ESTA EL CAMBIO IMPORTANTE:
         ya NO es blanca. ahora es una caja candy multicolor */
      background:
        radial-gradient(circle at 12% 18%, rgba(255,174,220,.95) 0 18%, transparent 19%),
        radial-gradient(circle at 88% 16%, rgba(162,236,255,.95) 0 16%, transparent 17%),
        radial-gradient(circle at 18% 82%, rgba(255,221,155,.92) 0 16%, transparent 17%),
        radial-gradient(circle at 82% 78%, rgba(203,183,255,.92) 0 17%, transparent 18%),
        radial-gradient(circle at 54% 52%, rgba(180,255,223,.70) 0 20%, transparent 21%),
        linear-gradient(180deg,
          #ffdff0 0%,
          #ffecc7 24%,
          #dff7ff 50%,
          #f0e5ff 74%,
          #e6fff4 100%);
      backdrop-filter: blur(4px);
      isolation:isolate;
    }

    /* CAPA DE CONFETI DENTRO DE LA TARJETA */
    .music-card::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:0;
      opacity:.9;
      background:
        radial-gradient(circle at 10% 14%, rgba(255,255,255,.95) 0 4px, transparent 5px),
        radial-gradient(circle at 20% 40%, rgba(255,105,180,.30) 0 4px, transparent 5px),
        radial-gradient(circle at 32% 18%, rgba(77,205,248,.30) 0 4px, transparent 5px),
        radial-gradient(circle at 48% 72%, rgba(255,162,70,.28) 0 4px, transparent 5px),
        radial-gradient(circle at 68% 24%, rgba(163,120,255,.28) 0 4px, transparent 5px),
        radial-gradient(circle at 78% 62%, rgba(83,216,168,.30) 0 4px, transparent 5px),
        radial-gradient(circle at 90% 28%, rgba(255,210,90,.30) 0 4px, transparent 5px),
        radial-gradient(circle at 84% 84%, rgba(255,255,255,.95) 0 4px, transparent 5px);
    }

    /* SERPENTINAS SUAVES */
    .music-card::after{
      content:"";
      position:absolute;
      inset:-10%;
      pointer-events:none;
      z-index:0;
      opacity:.35;
      background:
        repeating-linear-gradient(35deg,
          rgba(255,255,255,.20) 0px,
          rgba(255,255,255,.20) 10px,
          transparent 10px,
          transparent 26px),
        repeating-linear-gradient(-35deg,
          rgba(255,255,255,.16) 0px,
          rgba(255,255,255,.16) 8px,
          transparent 8px,
          transparent 24px);
      transform:rotate(-3deg);
    }

    .music-inner{
      position:relative;
      z-index:2;
    }

    /* GLOBITOS DECORATIVOS */
    .decor-balloon{
      position:absolute;
      border-radius:50% 50% 45% 45%;
      box-shadow:
        inset -10px -16px 20px rgba(0,0,0,.10),
        inset 10px 12px 16px rgba(255,255,255,.35),
        0 12px 24px rgba(130,120,180,.16);
      z-index:1;
      opacity:.95;
    }

    .decor-balloon::before{
      content:"";
      position:absolute;
      width:22%;
      height:38%;
      left:16%;
      top:14%;
      background:rgba(255,255,255,.35);
      border-radius:50%;
      transform:rotate(-14deg);
    }

    .decor-balloon::after{
      content:"";
      position:absolute;
      width:2px;
      height:30px;
      background:rgba(130,120,150,.26);
      left:50%;
      top:100%;
      transform:translateX(-50%);
    }

    .b1{
      width:70px;height:86px;
      top:24px;left:18px;
      background:linear-gradient(180deg,#ff9ad5,#f04aa8);
      transform:rotate(-6deg);
    }

    .b2{
      width:60px;height:74px;
      top:38px;right:28px;
      background:linear-gradient(180deg,#9fe7ff,#3fbef0);
      transform:rotate(8deg);
    }

    .b3{
      width:54px;height:68px;
      bottom:90px;left:24px;
      background:linear-gradient(180deg,#ffd29b,#ff9b3d);
      transform:rotate(-5deg);
    }

    .b4{
      width:64px;height:80px;
      bottom:70px;right:18px;
      background:linear-gradient(180deg,#d7b7ff,#9a6bff);
      transform:rotate(7deg);
    }

    .b5{
      width:50px;height:62px;
      top:120px;right:72px;
      background:linear-gradient(180deg,#a7f5d0,#43d6a2);
      transform:rotate(-8deg);
    }

    .title{
      text-align:center;
      color:#7b4f83;
      margin-bottom:10px;
      font-size:1.7rem;
      font-weight:900;
      text-shadow:0 2px 0 rgba(255,255,255,.35);
    }

    .subtitle{
      text-align:center;
      color:#8d6f92;
      font-size:1rem;
      line-height:1.5;
      max-width:420px;
      margin:0 auto 18px;
      padding:0 10px;
      font-weight:700;
    }

    /* CAJA DEL REPRODUCTOR */
    .player-shell{
      position:relative;
      z-index:2;
      margin:0 auto;
      width:min(100%, 430px);
      border-radius:28px;
      padding:16px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.50), rgba(255,255,255,.34));
      border:2px solid rgba(255,255,255,.62);
      box-shadow:
        0 16px 32px rgba(140,120,190,.14),
        inset 0 1px 0 rgba(255,255,255,.55);
      backdrop-filter: blur(4px);
    }

    .player-shell::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius:22px;
      pointer-events:none;
      background:
        linear-gradient(135deg,
          rgba(255,255,255,.20),
          rgba(255,255,255,0) 35%,
          rgba(255,255,255,.14) 65%,
          rgba(255,255,255,0));
      z-index:0;
    }

    .spotify-frame{
      position:relative;
      z-index:1;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 10px 24px rgba(0,0,0,.10);
      line-height:0;
    }

    .spotify-frame iframe{
      display:block;
      width:100%;
      border:0;
      border-radius:22px;
    }

    .footer-note{
      margin-top:18px;
      text-align:center;
      color:#8a6d8e;
      font-size:.95rem;
      line-height:1.5;
      font-weight:700;
      padding:0 10px;
    }

    .brand{
      margin-top:12px;
      text-align:center;
      font-size:.78rem;
      color:#9a89a1;
      font-weight:700;
    }

    @media (max-width:560px){
      body{
        padding:14px 10px 24px;
      }

      .music-card{
        border-radius:28px;
        padding:18px 12px 20px;
      }

      .title{
        font-size:1.45rem;
      }

      .subtitle{
        font-size:.96rem;
      }

      .player-shell{
        padding:12px;
        border-radius:24px;
      }

      .spotify-frame iframe{
        height:352px;
      }

      .b1{width:58px;height:72px;left:10px;top:20px;}
      .b2{width:52px;height:64px;right:14px;top:30px;}
      .b3{width:48px;height:60px;left:10px;bottom:82px;}
      .b4{width:54px;height:68px;right:10px;bottom:70px;}
      .b5{width:44px;height:56px;right:56px;top:110px;}
    }
  </style>
</head>
<body>
  <main class="page">

    <div class="topbar">
      <a href="index.html" class="back-btn">← Volver al cumple</a>
    </div>

    <section class="music-card">
      <!-- globitos decorativos -->
      <span class="decor-balloon b1"></span>
      <span class="decor-balloon b2"></span>
      <span class="decor-balloon b3"></span>
      <span class="decor-balloon b4"></span>
      <span class="decor-balloon b5"></span>

      <div class="music-inner">
        <h1 class="title">🎵 La música de mi fiesta 🎵</h1>

        <p class="subtitle">
          Dale play y reviví conmigo los momentos más lindos del cumple 💖
        </p>

        <div class="player-shell">
          <div class="spotify-frame">
            <iframe
              src="https://open.spotify.com/embed/playlist/3pZjoQ5djaJCTi1eWR24Pa?utm_source=generator"
              width="100%"
              height="352"
              allowfullscreen=""
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy">
            </iframe>
          </div>
        </div>

        <p class="footer-note">
          Gracias por compartir esta fiesta conmigo ✨🎈
        </p>

        <p class="brand">
          Diseño digital por MORGANA TECNO
        </p>
      </div>
    </section>

  </main>
</body>
</html>
