<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQjIYkXtO2tx9TqU1hLp8SDPA1MvlpzdFyD2Sqp5zQarMC1LxdtWDOxYtMLIrDtb_4gN8lzqYkDSx2i/pub?gid=0&single=true&output=csv";

async function loadMessages(){
try{

const res = await fetch(SHEET_URL + "&t=" + Date.now());
const data = await res.text();

const rows = data.trim().split("\n").slice(1).reverse();

const wall = document.getElementById("wall");
wall.innerHTML = "";

rows.forEach(row => {

const cols = row.split(",");

/* 🔴 MAPEO SIMPLE Y FIJO */
const id = cols[0] || "";
const time = cols[1] || "";
const name = cols[2] || "";
const msg  = cols[3] || "";

/* si no hay mensaje, no dibuja */
if(msg === "" || msg === undefined) return;

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<div class="name">👤 ${name || "Anónimo"}</div>
<div class="time">🕒 ${time}</div>
<div class="text">${msg}</div>
`;

wall.appendChild(card);

});

}catch(err){
console.log(err);
document.getElementById("wall").innerHTML =
"<p>Error cargando mensajes 💔</p>";
}
}

loadMessages();

</script>
