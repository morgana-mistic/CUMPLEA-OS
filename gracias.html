<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias 💖</title>

<style>
body{
margin:0;
font-family: Arial, sans-serif;
background: linear-gradient(135deg,#ffd6ec,#dff6ff,#fff5d7);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.card{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
max-width:320px;
animation:pop 0.6s ease;
}

h1{
color:#ff4fa3;
font-size:28px;
margin-bottom:10px;
}

p{
color:#555;
font-size:16px;
}

.heart{
font-size:40px;
animation:float 1.5s infinite ease-in-out;
}

@keyframes pop{
from{transform:scale(0.5);opacity:0;}
to{transform:scale(1);opacity:1;}
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

button{
margin-top:15px;
background:linear-gradient(45deg,#ff4fa3,#ff8ad4);
border:none;
padding:10px 18px;
border-radius:25px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <div class="heart">🎉💖🎉</div>

  <h1>¡Gracias!</h1>

  <p>
  Tu mensajito ya forma parte<br>
  de los recuerdos del cumple de Matías.
  </p>

  <p>✨ Gracias por estar acá ✨</p>

  <button onclick="window.location.href='index.html'">
  Volver al inicio
  </button>
</div>

</body>
</html>
