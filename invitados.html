<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiénes compartieron mi día</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(-45deg,#ffd1dc,#ffeaa7,#c7f9ff,#ffd6ff);
background-size:400%400%;
animation:bg 12s ease infinite;
overflow:hidden;
}

@keyframes bg{
0%{background-position:0%50%}
50%{background-position:100%50%}
100%{background-position:0%50%}
}

header{
text-align:center;
padding:40px 15px 10px;
color:#fff;
text-shadow:0 2px 10px rgba(0,0,0,.2);
}

header h1{
margin:0;
font-size:28px;
}

header p{
opacity:.8;
font-size:14px;
}

.btn{
position:fixed;
top:15px;
left:15px;
background:#fff;
padding:10px 14px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
color:#7a2cff;
box-shadow:0 8px 20px rgba(0,0,0,.15);
z-index:10;
}

.area{
position:relative;
width:100%;
height:80vh;
overflow:hidden;
}

.bubble{
position:absolute;
width:120px;
height:120px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
padding:10px;
font-weight:bold;
color:#fff;
background:rgba(255,255,255,.25);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.4);
box-shadow:0 10px 25px rgba(0,0,0,.2);
animation:float 6s ease-in-out infinite;
}

.bubble:nth-child(odd){animation-duration:7s}
.bubble:nth-child(even){animation-duration:9s}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(-20px)}
100%{transform:translateY(0px)}
}

/* posiciones distintas */
.b1{top:10%;left:10%;background:rgba(255,182,193,.5)}
.b2{top:15%;left:55%;background:rgba(186,225,255,.5)}
.b3{top:35%;left:25%;background:rgba(255,218,185,.5)}
.b4{top:40%;left:70%;background:rgba(221,160,221,.5)}
.b5{top:60%;left:15%;background:rgba(144,238,144,.5)}
.b6{top:65%;left:55%;background:rgba(255,192,203,.5)}
.b7{top:75%;left:35%;background:rgba(173,216,230,.5)}
.b8{top:25%;left:35%;background:rgba(255,250,205,.5)}

@media (max-width:600px){
.bubble{
width:90px;
height:90px;
font-size:12px;
}
}
</style>
</head>

<body>

<a class="btn" href="index.html">🏠 Inicio</a>

<header>
<h1>💌 ¿Quiénes compartieron mi día?</h1>
<p>Personas invitadas a este momento especial</p>
</header>

<div class="area">

<div class="bubble b1">Alicia Romero</div>
<div class="bubble b2">Mercedes Paz</div>
<div class="bubble b3">Joselita Mendoza</div>
<div class="bubble b4">Martín Miranda</div>
<div class="bubble b5">Facundo Espíndola</div>
<div class="bubble b6">Alan Guimard</div>
<div class="bubble b7">Matías Miranda</div>
<div class="bubble b8">Leo Messi</div>
<div class="bubble b3" style="top:55%;left:80%;background:rgba(255,200,150,.5)">El nuevo del grado</div>

</div>

</body>
</html>
