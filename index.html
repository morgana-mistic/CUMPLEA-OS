
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cumple de Matías</title>

  <style>
    :root{
      --bg-pink:#ffe7f4;
      --bg-lilac:#f7ecff;
      --bg-blue:#eef7ff;
      --text:#5a2b5f;
      --shadow:0 14px 34px rgba(218, 104, 179, .20);
      --shadow-soft:0 8px 20px rgba(130, 130, 200, .18);
      --white:#ffffff;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    body{
      font-family:"Trebuchet MS","Segoe UI",Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 10%, #ffffff 0, #ffffff66 12%, transparent 13%),
        radial-gradient(circle at 80% 20%, #ffffff 0, #ffffff66 10%, transparent 11%),
        radial-gradient(circle at 10% 70%, #ffffff 0, #ffffff66 10%, transparent 11%),
        linear-gradient(180deg, var(--bg-pink) 0%, var(--bg-lilac) 45%, var(--bg-blue) 100%);
      min-height:100vh;
      padding:18px 12px 28px;
    }

    .page{
      width:min(100%, 520px);
      margin:0 auto;
    }

    .hero{
      background:linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,255,255,.88));
      border-radius:34px;
      padding:14px;
      box-shadow:var(--shadow);
      overflow:hidden;
      position:relative;
    }

    .hero-image-wrap{
      position:relative;
      width:100%;
      border-radius:28px;
      overflow:visible;
      background:#fff;
      box-shadow:0 10px 24px rgba(155, 112, 189, .15);
      padding-bottom:95px; /* espacio para que los globos "cuelguen" abajo */
    }

    .hero-image{
      width:100%;
      display:block;
      height:auto;
      border-radius:24px;
      position:relative;
      z-index:1;
    }

    /* ===== GLOBOS ===== */
    .balloons{
      position:absolute;
      left:0;
      right:0;
      bottom:8px;
      z-index:3;
      pointer-events:none;
    }

    .balloon{
      position:absolute;
      width:118px;
      min-height:86px;
      padding:18px 14px 20px;
      border-radius:58% 58% 54% 54% / 62% 62% 42% 42%;
      text-align:center;
      text-decoration:none;
      color:#fff;
      font-weight:800;
      font-size:.92rem;
      line-height:1.18;
      box-shadow:
        0 12px 22px rgba(130, 70, 130, .18),
        inset 0 10px 16px rgba(255,255,255,.22);
      border:2px solid rgba(255,255,255,.45);
      display:flex;
      align-items:center;
      justify-content:center;
      pointer-events:auto;
      transition:transform .2s ease, box-shadow .2s ease;
      transform-origin:center bottom;
      text-shadow:0 1px 2px rgba(0,0,0,.15);
      backdrop-filter: blur(1px);
    }

    .balloon::before{
      content:"";
      position:absolute;
      width:34px;
      height:16px;
      background:rgba(255,255,255,.28);
      border-radius:50%;
      top:12px;
      left:18px;
      transform:rotate(-18deg);
      filter:blur(.2px);
    }

    .balloon::after{
      content:"";
      position:absolute;
      width:2px;
      height:38px;
      background:rgba(120, 100, 140, .35);
      bottom:-36px;
      left:50%;
      transform:translateX(-50%);
      border-radius:2px;
    }

    .balloon:hover{
      transform:translateY(-4px) scale(1.03);
      box-shadow:
        0 16px 28px rgba(130, 70, 130, .22),
        inset 0 10px 16px rgba(255,255,255,.24);
    }

    /* Colores */
    .music{
      background:linear-gradient(180deg, #ff84c8, #f24ea6);
      left:8px;
      bottom:8px;
      animation:float1 4.6s ease-in-out infinite;
    }

    .fotos{
      background:linear-gradient(180deg, #7fe1ff, #45c6fb);
      left:108px;
      bottom:24px;
      animation:float2 5.1s ease-in-out infinite;
    }

    .mensajes{
      background:linear-gradient(180deg, #cdaeff, #a46eff);
      left:205px;
      bottom:2px;
      animation:float3 4.8s ease-in-out infinite;
    }

    .invitados{
      background:linear-gradient(180deg, #ffbf73, #ff9d3f);
      right:100px;
      bottom:24px;
      animation:float4 5.4s ease-in-out infinite;
    }

    .subir{
      background:linear-gradient(180deg, #8fe9c7, #49d8a1);
      right:8px;
      bottom:8px;
      animation:float5 4.9s ease-in-out infinite;
    }

    /* Animaciones de flotación */
    @keyframes float1{
      0%,100%{ transform:translateY(0) rotate(-2deg); }
      50%{ transform:translateY(-8px) rotate(1deg); }
    }

    @keyframes float2{
      0%,100%{ transform:translateY(0) rotate(1deg); }
      50%{ transform:translateY(-10px) rotate(-1deg); }
    }

    @keyframes float3{
      0%,100%{ transform:translateY(0) rotate(-1deg); }
      50%{ transform:translateY(-7px) rotate(1deg); }
    }

    @keyframes float4{
      0%,100%{ transform:translateY(0) rotate(2deg); }
      50%{ transform:translateY(-9px) rotate(-1deg); }
    }

    @keyframes float5{
      0%,100%{ transform:translateY(0) rotate(-1deg); }
      50%{ transform:translateY(-8px) rotate(2deg); }
    }

    .footer-note{
      margin-top:18px;
      text-align:center;
      font-size:.88rem;
      color:#8a6d8e;
      padding:0 8px;
      line-height:1.4;
    }

    .brand-signature{
      margin-top:14px;
      text-align:center;
      font-size:.72rem;
      color:#9c86a3;
      line-height:1.3;
    }

    .brand-signature a{
      color:#9c86a3;
      text-decoration:none;
      border-bottom:1px solid rgba(156,134,163,.35);
      transition:opacity .2s ease;
    }

    .brand-signature a:hover{
      opacity:.75;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 520px){
      .hero{
        padding:10px;
        border-radius:26px;
      }

      .hero-image-wrap{
        border-radius:22px;
        padding-bottom:260px;
      }

      .hero-image{
        border-radius:20px;
      }

      .balloons{
        position:absolute;
        left:0;
        right:0;
        bottom:0;
        height:250px;
      }

      .balloon{
        width:42%;
        min-height:84px;
        font-size:.9rem;
        padding:16px 12px 18px;
      }

      .music{
        left:4%;
        bottom:140px;
      }

      .fotos{
        right:4%;
        left:auto;
        bottom:146px;
      }

      .mensajes{
        left:4%;
        bottom:48px;
      }

      .invitados{
        right:4%;
        bottom:54px;
      }

      .subir{
        left:50%;
        right:auto;
        transform:translateX(-50%);
        bottom:-8px;
        width:48%;
      }

      .music:hover,
      .fotos:hover,
      .mensajes:hover,
      .invitados:hover{
        transform:translateY(-4px) scale(1.03);
      }

      .subir:hover{
        transform:translateX(-50%) translateY(-4px) scale(1.03);
      }

      @keyframes float5{
        0%,100%{ transform:translateX(-50%) translateY(0) rotate(-1deg); }
        50%{ transform:translateX(-50%) translateY(-8px) rotate(2deg); }
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero">
      <div class="hero-image-wrap">
        <img src="PORTADA.jpg" alt="Portada del cumpleaños de Matías" class="hero-image">

        <div class="balloons">
          <a href="musica.html" class="balloon music">Dale play a mi fiesta</a>
          <a href="fotos.html" class="balloon fotos">Mis fotos favoritas</a>
          <a href="mensajes.html" class="balloon mensajes">Dejame un mensajito</a>
          <a href="invitados.html" class="balloon invitados">Quienes compartieron mi día</a>
          <a href="subi-tu-foto.html" class="balloon subir">Compartí tu foto conmigo</a>
        </div>
      </div>

      <p class="footer-note">
        Gracias por acompañarme en este día tan especial 💖
      </p>

      <p class="brand-signature">
        <a href="https://wa.me/5493854118422" target="_blank" rel="noopener noreferrer">
          Diseño digital por MORGANA TECNO
        </a>
      </p>
    </section>
  </main>
</body>
</html>
