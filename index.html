<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumple de Matías</title>

<style>
:root{
  --text:#5a2b5f;
  --muted:#8a6d8e;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  padding:18px;
  color:var(--text);

  /* 🌈 FONDO CANDY MÁS CALIDO */
  background:
    radial-gradient(circle at 20% 10%, #ffd6ec 0%, transparent 35%),
    radial-gradient(circle at 80% 20%, #c7f3ff 0%, transparent 40%),
    radial-gradient(circle at 50% 90%, #ffe6b8 0%, transparent 40%),
    linear-gradient(180deg,#f8fbff,#fdf6ff);
  overflow-x:hidden;
}

/* 🎉 CONFETI DETRÁS DE TODO */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 10% 20%, #ff6fb1 2px, transparent 3px),
    radial-gradient(circle at 30% 80%, #4dcdf8 2px, transparent 3px),
    radial-gradient(circle at 70% 30%, #ffa246 2px, transparent 3px),
    radial-gradient(circle at 90% 60%, #a873ff 2px, transparent 3px),
    radial-gradient(circle at 50% 50%, #53d8a8 2px, transparent 3px),
    radial-gradient(circle at 15% 70%, #ffd166 2px, transparent 3px),
    radial-gradient(circle at 85% 10%, #ff90cf 2px, transparent 3px);
  opacity:.35;
  filter:blur(.2px);
  animation:confettiMove 12s linear infinite;
}

@keyframes confettiMove{
  0%{transform:translateY(0);}
  100%{transform:translateY(-20px);}
}

/* CONTENEDOR */
.page{
  max-width:520px;
  margin:auto;
  position:relative;
  z-index:1;
}

/* PORTADA */
.hero{
  background:#fff;
  border-radius:28px;
  padding:10px;
  box-shadow:0 16px 36px rgba(120,170,220,.18);
}

.hero img{
  width:100%;
  border-radius:20px;
  display:block;
}

/* 🎈 GLOBOS */
.balloons{
  margin-top:-30px;
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  gap:14px;
  padding:0 6px;
}

.balloon{
  width:48%;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
}

/* GLOBO */
.shape{
  width:82px;
  height:98px;
  border-radius:50% 50% 45% 45%;
  position:relative;
  box-shadow:0 12px 22px rgba(0,0,0,.15);
  animation:float 4.8s ease-in-out infinite;
}

.shape::after{
  content:"";
  position:absolute;
  width:2px;
  height:26px;
  background:#aaa;
  left:50%;
  top:100%;
  transform:translateX(-50%);
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
}

/* COLORES GLOBOS */
.music .shape{background:linear-gradient(180deg,#ff90cf,#f45bb0);}
.fotos .shape{background:linear-gradient(180deg,#8ce5ff,#4dcdf8);}
.mensajes .shape{background:linear-gradient(180deg,#d2b7ff,#a873ff);}
.invitados .shape{background:linear-gradient(180deg,#ffc57f,#ffa246);}
.subir .shape{background:linear-gradient(180deg,#9cf0cf,#53d8a8);}

/* 🏷 ETIQUETAS MÁS LEGIBLES */
.tag{
  margin-top:6px;
  width:100%;
  padding:10px;
  border-radius:14px;
  text-align:center;
  font-size:.78rem;
  font-weight:800;
  color:#fff;
  box-shadow:0 8px 16px rgba(0,0,0,.12);
}

/* colores etiquetas */
.music .tag{background:#f45bb0;}
.fotos .tag{background:#4dcdf8;}
.mensajes .tag{background:#a873ff;}
.invitados .tag{background:#ffa246;}
.subir .tag{background:#53d8a8;}

/* FOOTER */
.footer{
  margin-top:18px;
  text-align:center;
  color:var(--muted);
  font-size:.9rem;
}

.brand{
  margin-top:10px;
  text-align:center;
  font-size:.75rem;
  color:#9aa6b7;
}

.brand a{
  color:inherit;
  text-decoration:none;
}
</style>
</head>

<body>

<div class="page">

  <div class="hero">
    <img src="PORTADA1.png" alt="portada cumpleaños">
  </div>

  <div class="balloons">

    <a href="musica.html" class="balloon music">
      <div class="shape"></div>
      <div class="tag">Dale play a mi fiesta</div>
    </a>

    <a href="fotos.html" class="balloon fotos">
      <div class="shape"></div>
      <div class="tag">Mis fotos favoritas</div>
    </a>

    <a href="mensajes.html" class="balloon mensajes">
      <div class="shape"></div>
      <div class="tag">Dejame un mensajito</div>
    </a>

    <a href="invitados.html" class="balloon invitados">
      <div class="shape"></div>
      <div class="tag">Quienes compartieron mi día</div>
    </a>

    <a href="subi-tu-foto.html" class="balloon subir">
      <div class="shape"></div>
      <div class="tag">Compartí tu foto conmigo</div>
    </a>

  </div>

  <div class="footer">
    Gracias por acompañarme en este día tan especial 💖
  </div>

  <div class="brand">
    <a href="https://wa.me/5493854118422" target="_blank">
      Diseño digital por MORGANA TECNO
    </a>
  </div>

</div>

</body>
</html>
