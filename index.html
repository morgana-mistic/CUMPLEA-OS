<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumple de Matías</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  padding:18px;
  overflow-x:hidden;

  background:
    radial-gradient(circle at 20% 10%, #ffd6ec 0%, transparent 40%),
    radial-gradient(circle at 80% 20%, #c7f3ff 0%, transparent 45%),
    radial-gradient(circle at 50% 90%, #ffe6b8 0%, transparent 45%),
    linear-gradient(180deg,#fdf6ff,#f8fbff);
}

/* CONFETI */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;

  background:
    radial-gradient(circle at 10% 20%, rgba(255,105,180,.35) 2px, transparent 3px),
    radial-gradient(circle at 30% 70%, rgba(77,205,248,.35) 2px, transparent 3px),
    radial-gradient(circle at 70% 30%, rgba(255,162,70,.35) 2px, transparent 3px),
    radial-gradient(circle at 90% 60%, rgba(163,120,255,.35) 2px, transparent 3px),
    radial-gradient(circle at 50% 50%, rgba(83,216,168,.35) 2px, transparent 3px);

  opacity:.55;
  animation:confetti 14s linear infinite;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;

  background:
    repeating-linear-gradient(45deg,
      rgba(255,182,193,.08) 0px,
      rgba(255,182,193,.08) 6px,
      transparent 6px,
      transparent 18px),
    repeating-linear-gradient(-45deg,
      rgba(173,216,230,.07) 0px,
      rgba(173,216,230,.07) 6px,
      transparent 6px,
      transparent 18px);

  opacity:.5;
}

@keyframes confetti{
  0%{transform:translateY(0);}
  100%{transform:translateY(-25px);}
}

.page{
  max-width:520px;
  margin:auto;
  position:relative;
  z-index:1;
}

/* PORTADA */
.hero{
  background:#fff;
  border-radius:28px;
  padding:10px;
  box-shadow:0 16px 36px rgba(120,170,220,.18);
}

.hero img{
  width:100%;
  border-radius:20px;
  display:block;
}

/* GLOBOS */
.balloons{
  position:relative;
  height:340px;
  margin-top:-20px;
}

.balloon{
  position:absolute;
  width:110px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
}

/* GLOBO CANDY */
.shape{
  width:86px;
  height:102px;
  border-radius:50% 50% 45% 45%;
  position:relative;

  box-shadow:
    inset -10px -18px 25px rgba(0,0,0,.18),
    inset 10px 14px 18px rgba(255,255,255,.35),
    0 14px 24px rgba(0,0,0,.15);

  animation:float 5s ease-in-out infinite;
}

.shape::before{
  content:"";
  position:absolute;
  width:26px;
  height:48px;
  top:12px;
  left:14px;
  background:rgba(255,255,255,.35);
  border-radius:50%;
}

.shape::after{
  content:"";
  position:absolute;
  width:2px;
  height:28px;
  background:rgba(120,120,120,.4);
  left:50%;
  top:100%;
  transform:translateX(-50%);
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* ETIQUETAS */
.tag{
  margin-top:8px;
  padding:10px;
  width:100%;
  border-radius:14px;
  text-align:center;
  font-size:.76rem;
  font-weight:800;
  color:#fff;
  box-shadow:0 10px 18px rgba(0,0,0,.12);
}

/* COLORES */
.music .shape{background:linear-gradient(180deg,#ff9ad5,#f04aa8);}
.fotos .shape{background:linear-gradient(180deg,#9fe7ff,#3fbef0);}
.mensajes .shape{background:linear-gradient(180deg,#d7b7ff,#9a6bff);}
.invitados .shape{background:linear-gradient(180deg,#ffd29b,#ff9b3d);}

/* 🎮 JUEGO (CORREGIDO SOLO COLOR) */
.juego .shape{
  background:linear-gradient(180deg,#fff59d,#fbc02d);
}

.juego .tag{
  background:#fbc02d;
  color:#5a2b00;
}

/* etiquetas normales */
.music .tag{background:#f04aa8;}
.fotos .tag{background:#3fbef0;}
.mensajes .tag{background:#9a6bff;}
.invitados .tag{background:#ff9b3d;}

/* POSICIONES (INTACTAS) */
.music{top:10px;left:10px;}
.fotos{top:10px;right:10px;}

.mensajes{
  top:95px;
  left:50%;
  transform:translateX(-50%);
}

.invitados{
  top:190px;
  left:15px;
}

.juego{
  top:190px;
  right:15px;
}

/* FOOTER */
.footer{
  margin-top:20px;
  text-align:center;
  color:#8a6d8e;
  font-size:.9rem;
  position:relative;
  z-index:2;
}

.brand{
  margin-top:10px;
  text-align:center;
  font-size:.75rem;
  color:#9aa6b7;
  position:relative;
  z-index:2;
}
</style>
</head>

<body>

<div class="page">

  <div class="hero">
    <img src="PORTADA1.png" alt="portada">
  </div>

  <div class="balloons">

    <a href="musica.html" class="balloon music">
      <div class="shape"></div>

    </a>

    <a href="fotos.html" class="balloon fotos">
      <div class="shape"></div>
      <div class="tag">Mis fotos favoritas</div>
    </a>

    <a href="mensajes.html" class="balloon mensajes">
      <div class="shape"></div>
      <div class="tag">Dejame un mensajito</div>
    </a>

    <a href="invitados.html" class="balloon invitados">
      <div class="shape"></div>
      <div class="tag">Quienes compartieron mi día</div>
    </a>

    <a href="juego.html" class="balloon juego">
      <div class="shape"></div>
      <div class="tag">¡Juguemos!</div>
    </a>

  </div>

  <div class="footer">
    Gracias por acompañarme en este día tan especial 💖
  </div>

  <div class="brand">

</a>
  </div>

</html>
