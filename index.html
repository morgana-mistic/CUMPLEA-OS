<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cumple de Matías</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  padding:18px;

  background:
    radial-gradient(circle at 20% 10%, #ffd6ec 0%, transparent 40%),
    radial-gradient(circle at 80% 20%, #c7f3ff 0%, transparent 45%),
    radial-gradient(circle at 50% 90%, #ffe6b8 0%, transparent 45%),
    linear-gradient(180deg,#fdf6ff,#f8fbff);
}

/* 🎉 CONFETI + SERPENTINAS SUAVES */
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(circle at 10% 20%, rgba(255,105,180,.35) 2px, transparent 3px),
    radial-gradient(circle at 30% 70%, rgba(77,205,248,.35) 2px, transparent 3px),
    radial-gradient(circle at 70% 30%, rgba(255,162,70,.35) 2px, transparent 3px),
    radial-gradient(circle at 90% 60%, rgba(163,120,255,.35) 2px, transparent 3px),
    radial-gradient(circle at 50% 50%, rgba(83,216,168,.35) 2px, transparent 3px);

  opacity:.6;
  animation:floatConfetti 14s linear infinite;
}

/* serpentinas (líneas suaves) */
body::after{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background:
    repeating-linear-gradient(45deg,
      rgba(255,182,193,.08) 0px,
      rgba(255,182,193,.08) 6px,
      transparent 6px,
      transparent 18px),
    repeating-linear-gradient(-45deg,
      rgba(173,216,230,.07) 0px,
      rgba(173,216,230,.07) 6px,
      transparent 6px,
      transparent 18px);
  opacity:.5;
}

@keyframes floatConfetti{
  0%{transform:translateY(0);}
  100%{transform:translateY(-25px);}
}

/* CONTENEDOR */
.page{
  max-width:520px;
  margin:auto;
  position:relative;
  z-index:1;
}

/* PORTADA */
.hero{
  background:#fff;
  border-radius:28px;
  padding:10px;
  box-shadow:0 16px 36px rgba(120,170,220,.18);
}

.hero img{
  width:100%;
  border-radius:20px;
  display:block;
}

/* 🎈 CAPA DE GLOBOS LIBRE */
.balloons{
  position:relative;
  height:340px;
  margin-top:-30px;
}

/* BASE GLOBO */
.balloon{
  position:absolute;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-decoration:none;
  width:110px;
}

/* GLOBO CANDY GLOSSY */
.shape{
  width:88px;
  height:104px;
  border-radius:50% 50% 45% 45%;
  position:relative;

  box-shadow:
    inset -10px -18px 25px rgba(0,0,0,.18),
    inset 10px 14px 18px rgba(255,255,255,.35),
    0 14px 24px rgba(0,0,0,.15);

  border:1px solid rgba(255,255,255,.4);

  animation:float 5s ease-in-out infinite;
}

/* brillo glossy */
.shape::before{
  content:"";
  position:absolute;
  width:28px;
  height:50px;
  top:12px;
  left:14px;
  background:rgba(255,255,255,.35);
  border-radius:50%;
  filter:blur(.2px);
}

/* hilo */
.shape::after{
  content:"";
  position:absolute;
  width:2px;
  height:30px;
  background:rgba(120,120,120,.4);
  left:50%;
  top:100%;
  transform:translateX(-50%);
}

/* animación suave */
@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-12px);}
}

/* 🏷 etiquetas */
.tag{
  margin-top:8px;
  padding:10px;
  width:100%;
  border-radius:14px;
  text-align:center;
  font-size:.76rem;
  font-weight:800;
  color:#fff;
  box-shadow:0 10px 18px rgba(0,0,0,.12);
}

/* COLORES */
.music .shape{background:linear-gradient(180deg,#ff9ad5,#f04aa8);}
.fotos .shape{background:linear-gradient(180deg,#9fe7ff,#3fbef0);}
.mensajes .shape{background:linear-gradient(180deg,#d7b7ff,#9a6bff);}
.invitados .shape{background:linear-gradient(180deg,#ffd29b,#ff9b3d);}
.subir .shape{background:linear-gradient(180deg,#a7f5d0,#43d6a2);}

/* tags */
.music .tag{background:#f04aa8;}
.fotos .tag{background:#3fbef0;}
.mensajes .tag{background:#9a6bff;}
.invitados .tag{background:#ff9b3d;}
.subir .tag{background:#43d6a2;}

/* 🎯 POSICIONES LIBRES (NO GRILLA) */
.music{top:10px;left:10px;}
.fotos{top:40px;right:10px;}
.mensajes{top:120px;left:60px;}
.invitados{top:160px;right:60px;}
.subir{top:240px;left:50%;transform:translateX(-50%);}

/* FOOTER */
.footer{
  margin-top:20px;
  text-align:center;
  color:#8a6d8e;
  font-size:.9rem;
}

.brand{
  margin-top:10px;
  text-align:center;
  font-size:.75rem;
  color:#9aa6b7;
}
</style>
</head>

<body>

<div class="page">

  <div class="hero">
    <img src="PORTADA1.png" alt="portada">
  </div>

  <!-- 🎈 GLOBOS SIN FILAS NI COLUMNAS -->
  <div class="balloons">

    <a href="musica.html" class="balloon music">
      <div class="shape"></div>
      <div class="tag">Dale play a mi fiesta</div>
    </a>

    <a href="fotos.html" class="balloon fotos">
      <div class="shape"></div>
      <div class="tag">Mis fotos favoritas</div>
    </a>

    <a href="mensajes.html" class="balloon mensajes">
      <div class="shape"></div>
      <div class="tag">Dejame un mensajito</div>
    </a>

    <a href="invitados.html" class="balloon invitados">
      <div class="shape"></div>
      <div class="tag">Quienes compartieron mi día</div>
    </a>

    <a href="subi-tu-foto.html" class="balloon subir">
      <div class="shape"></div>
      <div class="tag">Compartí tu foto conmigo</div>
    </a>

  </div>

  <div class="footer">
    Gracias por acompañarme en este día tan especial 💖
  </div>

  <div class="brand">
    Diseño digital por MORGANA TECNO
  </div>

</div>

</body>
</html>
